<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recharge - Electricity Tracker</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>⚡ Electricity Meter Tracker</h1>
            <nav>
                <a href="/">Dashboard</a>
                <a href="/recharge.html" class="active">Recharge</a>
                <a href="/history.html">History</a>
                <a href="/reports.html">Reports</a>
            </nav>
        </header>

        <div class="card">
            <h2>Add New Recharge</h2>
            <form id="recharge-form">
                <div class="form-row">
                    <div class="form-group">
                        <label>Date & Time</label>
                        <input type="datetime-local" id="recharge-datetime" required>
                    </div>
                    <div class="form-group">
                        <label>Units Added</label>
                        <input type="number" step="0.01" id="units-added" placeholder="e.g., 100" required>
                    </div>
                    <div class="form-group">
                        <label>Amount Spent</label>
                        <input type="number" step="0.01" id="amount-spent" placeholder="e.g., 50.00" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Notes (optional)</label>
                    <input type="text" id="recharge-notes" placeholder="Any notes...">
                </div>
                <button type="submit">Add Recharge</button>
            </form>
        </div>

        <div class="card">
            <h2>Past Recharges</h2>
            <table id="recharges-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Units</th>
                        <th>Amount</th>
                        <th>Notes</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td colspan="5" class="empty-state">No recharges yet</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById('recharge-datetime').value = now.toISOString().slice(0, 16);

        async function loadRecharges() {
            try {
                const res = await fetch('/api/recharges');
                const recharges = await res.json();

                const tbody = document.querySelector('#recharges-table tbody');
                if (recharges.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="empty-state">No recharges yet</td></tr>';
                    return;
                }

                // Sort by datetime descending
                recharges.sort((a, b) => new Date(b.datetime) - new Date(a.datetime));

                tbody.innerHTML = recharges.map(r => `
                    <tr>
                        <td>${r.datetime.replace('T', ' ')}</td>
                        <td>${r.units_added}</td>
                        <td>${r.amount_spent}</td>
                        <td>${r.notes || '-'}</td>
                        <td>
                            <button class="danger small" onclick="deleteRecharge(${r.id})">Delete</button>
                        </td>
                    </tr>
                `).join('');
            } catch (e) {
                console.error('Failed to load recharges:', e);
            }
        }

        document.getElementById('recharge-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const datetime = document.getElementById('recharge-datetime').value;
            const units_added = parseFloat(document.getElementById('units-added').value);
            const amount_spent = parseFloat(document.getElementById('amount-spent').value);
            const notes = document.getElementById('recharge-notes').value;

            try {
                await fetch('/api/recharges', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({datetime, units_added, amount_spent, notes})
                });
                document.getElementById('recharge-form').reset();
                document.getElementById('recharge-datetime').value = now.toISOString().slice(0, 16);
                loadRecharges();
            } catch (e) {
                alert('Failed to add recharge');
            }
        });

        async function deleteRecharge(id) {
            if (!confirm('Delete this recharge?')) return;
            try {
                await fetch(`/api/recharges/${id}`, {method: 'DELETE'});
                loadRecharges();
            } catch (e) {
                alert('Failed to delete');
            }
        }

        loadRecharges();
    </script>
</body>
</html>
